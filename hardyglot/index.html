<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardyglot - ArdyMarket</title>
    <link rel="icon" type="image/svg+xml" href="lingolab/icons/hg-fav.svg">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script>
        (async () => {
            const { data } = await window.supabase.auth.getSession();
            if (!data.session) window.location.href = '../index.html';
        })();
    </script>
    <style>
        body { font-family: 'Urbanist', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 60px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 800px; width: 90%; position: relative; }
        .volver { position: absolute; top: 20px; left: 20px; text-decoration: none; color: #6b7280; font-weight: 600; font-size: 14px; }
        .volver:hover { color: #10B981; }
        h1 { font-size: 36px; margin-bottom: 5px; color: #1f2937; }
        h1 span { color: #10B981; display: block; font-size: 20px; margin-top: 5px; font-weight: 600; }
        .intro { color: #6b7280; margin-bottom: 35px; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } .container { padding: 40px 25px; } }

        .card { border: 2px solid #E5E7EB; border-radius: 15px; padding: 30px 20px; text-decoration: none; color: #374151; transition: 0.3s; display: block; }
        .card:hover { border-color: #10B981; background: #f9fafb; transform: translateY(-5px); }
        .card i { font-size: 40px; color: #3B82F6; margin-bottom: 20px; }
        .card h2 { margin: 0 0 5px 0; font-size: 19px; color: #1f2937; }
        .card p { margin: 0; font-size: 13px; color: #6b7280; }
        .proximamente { opacity: 0.55; cursor: default; }
        .proximamente:hover { border-color: #E5E7EB; background: white; transform: none; }
        .badge { display: inline-block; margin-top: 10px; font-size: 11px; font-weight: 700; color: #b45309; background: #fef3c7; border-radius: 20px; padding: 3px 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a class="volver" href="../hub.html"><i class="fa-solid fa-arrow-left"></i> Hub</a>
        <h1>Hardyglot <span>Tu voz libre en cualquier idioma</span></h1>
        <p class="intro">Tu camino a una fluidez sin límites</p>
        <div class="grid">
            <a href="#" class="card proximamente" onclick="return false;">
                <i class="fa-solid fa-user-graduate"></i>
                <h2>Hardyglot Coach</h2>
                <p>Mentoría personalizada</p>
                <span class="badge">Próximamente</span>
            </a>
            <a href="lingolab/index.html" class="card">
                <i class="fa-solid fa-flask"></i>
                <h2>Lingo Lab</h2>
                <p>Laboratorio del Lenguage</p>
            </a>
            <a href="#" class="card proximamente" onclick="return false;">
                <i class="fa-solid fa-book-open"></i>
                <h2>Language Content</h2>
                <p>Contenido por idioma</p>
                <span class="badge">Próximamente</span>
            </a>
        </div>
    </div>
</body>
</html>
