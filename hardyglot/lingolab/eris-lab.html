<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eri's LingoLab - Hardyglot</title>
    <link rel="icon" type="image/svg+xml" href="icons/hg-fav.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fuentes recortadas: solo las que ofrece el Design Panel (antes eran ~30 familias) -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&family=Lora:wght@400;600;700&family=Montserrat:wght@300;400;700&family=Nunito:wght@300;400;700&family=Playfair+Display:wght@400;700&family=Roboto+Slab:wght@300;400;700&family=Quicksand:wght@300;400;700&family=Space+Grotesk:wght@300;400;700&family=Caveat:wght@400;700&family=Bitter:wght@300;400;700&family=Fira+Sans:wght@300;400;700&family=Amatic+SC:wght@400;700&family=Bona+Nova:wght@400;700&family=Cardo:wght@400;700&family=David+Libre:wght@400;500;700&family=Frank+Ruhl+Libre:wght@300;400;700&family=Fredoka:wght@300;400;600&family=Karantina:wght@300;400;700&family=Noto+Rashi+Hebrew&family=Playpen+Sans+Hebrew:wght@300;400;700&family=Rubik:wght@300;400;700&family=Rubik+Scribble&family=Varela+Round&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=home" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Gveret Levin (cursiva israelí) no está en Google Fonts.
           Al subir el archivo a fonts/GveretLevin.woff2 se activa sola. */
        @font-face {
            font-family: 'Gveret Levin';
            src: url('fonts/GveretLevin.woff2') format('woff2');
            font-display: swap;
        }

        :root {
            --color-1: #1A365D;   /* Azul Disciplina */
            --color-2: #D35400;   /* Naranja Constancia */
            --color-3: #5C4033;   /* Marrón Esfuerzo */
            --color-4: #707B7C;   /* Gris Resiliencia */
            --color-5: #F4F6F6;   /* Blanco Hueso */
            --font-primary: 'Poppins', sans-serif;
            --font-size-base: 16px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--font-primary);
            background: #F4F6F6;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* ancla arriba: el botón play no salta al cambiar el largo de la frase */
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            font-size: var(--font-size-base);
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 92%;
            max-width: 860px;
            padding: 25px 40px 30px;
            position: relative;
            margin-top: 3vh;
            margin-bottom: 3vh;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 10px;
        }

        .btn-icon {
            border: none;
            background: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--color-2);
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon.gear { color: #bbb; }
        .btn-icon.gear:hover { color: var(--color-1); }

        .etapa-seg {
            flex: 1; height: 5px; border-radius: 3px; background: #e5e7eb; transition: background 0.3s;
        }
        .etapa-seg.hecha { background: var(--color-1, #1A365D); }
        .etapa-seg.proximamente { background: repeating-linear-gradient(45deg, #e5e7eb, #e5e7eb 3px, #eee 3px, #eee 6px); }

        .contador {
            font-weight: 600;
            color: var(--color-4, #444);
            font-size: 12px;
            flex: 1;
            text-align: center;
        }

        /* ===== CONTROLES PRINCIPALES (ahora ARRIBA) ===== */
        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin: 5px 0 15px;
        }

        .btn-nav {
            background: #f8f9fa;
            border: 1px solid #eee;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-play {
            background: var(--color-1);
            color: white;
            border: none;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(27, 122, 99, 0.35);
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-play.playing { background: var(--color-5); }

        .btn-design-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #bbb;
        }
        .btn-design-toggle:hover { color: var(--color-3); }

        /* ===== BANNER DE REPASOS ===== */
        .banner-repasos {
            display: none;
            background: #fff8e6;
            border: 1px solid #f5d78e;
            color: #8a6d1a;
            border-radius: 12px;
            padding: 8px 14px;
            font-size: 13px;
            margin-bottom: 14px;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .banner-repasos button {
            border: none;
            background: var(--color-5);
            color: white;
            border-radius: 8px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        /* ===== BLOQUES DE IDIOMA ===== */
        .bloque { position: relative; }

        .frase-box {
            min-height: 115px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 6px;
            position: relative;
            text-align: center;
        }

        .texto-objetivo {
            font-size: 26px;
            font-weight: 700;
            color: var(--color-1);
            line-height: 1.35;
            transition: filter 0.3s, opacity 0.3s;
        }

        .texto-base {
            font-size: 19px;
            color: #444;
            line-height: 1.35;
            transition: filter 0.3s, opacity 0.3s;
        }

        .texto-oculto { filter: blur(8px); opacity: 0.5; }

        /* #16: traducción por palabra */
        .palabra { position: relative; }
        .palabra[data-glosa]:hover::after {
            content: attr(data-glosa);
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            background: #333; color: #fff; font-size: 11px; padding: 3px 8px;
            border-radius: 6px; white-space: nowrap; z-index: 100; pointer-events: none;
            direction: ltr; font-family: 'Poppins', sans-serif; font-weight: 400;
        }
        .palabra-col { display: inline-flex; flex-direction: column; align-items: center; vertical-align: top; }
        .glosa { font-size: 10px; color: #6b7280; font-weight: 400; margin-top: 1px;
                 font-family: 'Poppins', sans-serif; direction: ltr; line-height: 1.1; }

        .rtl { direction: rtl; }

        .translit {
            font-size: 15px;
            color: #95a5a6;
            font-style: italic;
            margin-top: 6px;
        }

        .palabra { cursor: pointer; border-radius: 4px; padding: 0 1px; }
        .palabra:hover { background: rgba(27, 122, 99, 0.12); }

        .utility-row {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 26px;
        }

        .nikud-toggle {
            border: 1px solid #eee;
            background: #fafafa;
            border-radius: 8px;
            padding: 3px 8px;
            font-size: 12px;
            cursor: pointer;
            color: #777;
        }
        .nikud-toggle { border: 1px solid #ccc; }
        .nikud-toggle.activo { color: var(--color-4, #444); border-color: var(--color-4, #888); background: #f0f0f0; font-weight: 600; }

        .progress-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 4px;
        }

        .phrase-play-btn {
            border: 1px solid #eee;
            background: #fafafa;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--color-1);
            font-size: 12px;
        }

        .btn-dominada {
            border: none;
            background: none;
            color: #999;
            cursor: pointer;
            font-size: 12px;
            text-decoration: underline;
        }
        .btn-dominada.hecha { color: var(--color-1); font-weight: 600; text-decoration: none; }

        .stars { color: var(--color-2, #D35400); font-size: 13px; letter-spacing: 2px; }
        .stars .far { color: #ddd; }

        .rep-counter { font-size: 12px; color: #999; min-width: 28px; }

        .divider {
            height: 2px;
            background: #f0f0f0;
            margin: 18px 0;
            border-radius: 2px;
        }

        /* ===== POPUPS DE CONFIG POR BLOQUE ===== */
        .config-popup {
            display: none;
            position: absolute;
            top: 30px;
            right: 0;
            background: white;
            border: 1px solid #eee;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
            padding: 14px;
            z-index: 50;
            width: 230px;
        }

        .config-popup h4 {
            margin: 0 0 10px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-close-popup { border: none; background: none; cursor: pointer; color: #999; }

        .config-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .config-row label { flex: 1; color: #555; }
        .config-row span { min-width: 26px; text-align: center; font-weight: 600; }

        .btn-fs {
            border: 1px solid #eee;
            background: #fafafa;
            border-radius: 6px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 13px;
            line-height: 1;
        }

        .config-toggle {
            border: 1px solid #eee;
            background: #fafafa;
            border-radius: 6px;
            padding: 3px 10px;
            cursor: pointer;
            font-size: 11px;
            color: #777;
        }
        .config-toggle.activo { color: var(--color-1); border-color: var(--color-1); }

        /* ===== MODAL USUARIO (idiomas + género) ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 360px;
        }

        .modal-content h3 { margin: 0 0 18px; font-size: 17px; color: #333; }

        .form-row { margin-bottom: 16px; }
        .form-row label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #777;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-row select {
            width: 100%;
            padding: 9px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: var(--font-primary);
            font-size: 14px;
        }

        .genero-opciones { display: flex; gap: 8px; }
        .genero-btn {
            flex: 1;
            padding: 9px;
            border: 1px solid #ddd;
            background: #fafafa;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
        }
        .genero-btn.activo {
            border-color: var(--color-1);
            color: var(--color-1);
            background: rgba(27, 122, 99, 0.06);
            font-weight: 600;
        }

        .nota-genero { font-size: 11px; color: #999; margin-top: 6px; line-height: 1.4; }

        .btn-primario {
            width: 100%;
            padding: 11px;
            background: var(--color-1);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            font-family: var(--font-primary);
            margin-top: 5px;
        }

        /* ===== DESIGN PANEL ===== */
        .design-panel {
            display: none;
            position: fixed;
            top: 12px;
            right: 12px;
            max-height: 55vh;
            width: 240px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            padding: 18px;
            z-index: 90;
            overflow-y: auto;
        }
        .design-panel.visible { display: block; }

        .design-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .design-row label { color: #555; }

        .color-input {
            width: 34px;
            height: 26px;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 1px;
            cursor: pointer;
        }

        .font-select {
            padding: 4px;
            font-size: 11px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .btn-close-design, .reset-btn {
            border: none;
            background: #eee;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
        }
        .reset-btn { color: #555; }
        /* Icono HardyGlot animado tipo ondas mientras suena */
        @keyframes hg-ondas {
            0%   { transform: scale(1);    opacity: 1; }
            50%  { transform: scale(1.25); opacity: 0.65; }
            100% { transform: scale(1);    opacity: 1; }
        }
        .hg-sonando { animation: hg-ondas 0.9s ease-in-out infinite; }

        /* Modal compacto: el botón Guardar siempre visible */
        .modal-content { max-height: 88vh; overflow-y: auto; }

        /* La paleta abre por encima del modal si se invoca desde ahí */
        .design-panel { z-index: 10000; }

        /* Chips de idiomas elegidos en el modal */
        .chip-elegido {
            display: inline-flex; align-items: center; gap: 4px;
            border: 1.5px solid var(--color-1, #1A365D); border-radius: 20px;
            padding: 3px 10px; font-size: 14px; background: #f0faf7; cursor: pointer;
        }
        .chip-elegido small { color: #888; font-size: 10px; }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../supabase-config.js"></script>
    <script>
        async function checkAuth() {
            const { data } = await window.supabase.auth.getSession();
            if (!data.session) window.location.href = '../../index.html';
        }
        checkAuth();
    </script>
</head>

<body>
    <div class="card">
        <!-- ===== BARRA SUPERIOR ===== -->
        <div class="top-bar">
            <button class="btn-icon" onclick="window.location.href='index.html'" title="Lingo Lab"><span
                    class="material-symbols-outlined" style="font-size:22px;">home</span></button>
            <div style="display:flex; flex-direction:column; align-items:center; line-height:1.2;">
                <span style="font-weight:800; font-size:17px; color:var(--color-1, #1A365D);">Eri's LingoLab</span>
                <span class="contador" id="contador">Cargando...</span>
                <div id="chips-idiomas" style="display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; justify-content:center;"></div>
                <div id="barra-global" style="width:150px; height:5px; border-radius:3px; background:#e5e7eb; margin-top:8px; overflow:hidden;" title="Progreso global del curso">
                    <div id="barra-global-fill" style="height:100%; width:0%; background:var(--color-2, #D35400); transition:width 0.4s;"></div>
                </div>
                <div id="barra-modulo" style="width:150px; height:5px; border-radius:3px; background:#e5e7eb; margin-top:3px; overflow:hidden;" title="Progreso del módulo actual">
                    <div id="barra-modulo-fill" style="height:100%; width:0%; background:var(--color-1, #1A365D); transition:width 0.3s;"></div>
                </div>
            </div>
            <div style="display:flex; flex-direction:column; align-items:center;">
                <button class="btn-icon gear" onclick="abrirModalUsuario()" title="Idiomas y perfil"><i
                        class="fas fa-user-cog"></i></button>
                <span id="nombre-alumno" style="font-size:10px; color:#999; max-width:70px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
            </div>
        </div>

        <!-- ===== CONTROLES PRINCIPALES (PLAY ARRIBA) ===== -->
        <div class="controls-row" style="margin-left:-12px;">
            <button class="btn-nav" onclick="cambiarFrase(-1)"><img src="icons/player-bck.svg" alt="Anterior" style="width:34px; height:34px;"></button>
            <button class="btn-play" id="btn-play" onclick="toggleAudio()" style="background:transparent; box-shadow:none; margin-left:-3px;"><img
                    id="play-icon" src="icons/player-ply.svg" alt="Play" style="width:48px; height:48px; display:block;"></button>
            <button class="btn-nav" onclick="cambiarFrase(1)" style="margin-left:-6px;"><img src="icons/player-fwd.svg" alt="Siguiente" style="width:34px; height:34px;"></button>
        </div>

        <!-- ===== BANNER DE REPASOS PENDIENTES ===== -->
        <div class="banner-repasos" id="banner-repasos">
            <span id="banner-texto">📚 Tienes repasos hoy</span>
            <span>
                <button onclick="filtrarRepasos()">Repasar</button>
                <button onclick="verTodas()" style="background:#bbb;">Todas</button>
            </span>
        </div>

        <!-- ===== BLOQUE IDIOMA OBJETIVO ===== -->
        <div class="bloque">
            <div class="frase-box">
                <div>
                    <div class="texto-objetivo" id="texto-obj">...</div>
                    <div class="translit" id="translit-obj" style="display:none;"></div>
                </div>
            </div>
            <div class="progress-row">
                <span class="rep-counter" id="rep-counter-obj">0/5</span>
                <button class="phrase-play-btn" onclick="playPhrase('obj')" title="Play"><img
                        id="phrase-icon-obj" src="icons/player-ply.svg" alt="Play" style="width:22px; height:22px; vertical-align:middle;"></button>
                <button class="btn-dominada" id="btn-dominada-obj" onclick="marcarDominada('obj')">¡Ya!</button>
                <span class="stars" id="stars-obj"></span>
            </div>
            <div class="utility-row">
                <button class="nikud-toggle" id="btn-nikud-obj" onclick="toggleNikud('obj')" style="display:none;"><i
                        class="fas fa-eye"></i> נקודים</button>
                <button class="btn-icon gear" onclick="abrirConfig('obj')" title="Config" style="margin-left:auto;"><i
                        class="fas fa-cog"></i></button>
            </div>
            <div class="config-popup" id="config-obj">
                <h4><span id="config-titulo-obj">Objetivo</span> <button class="btn-close-popup"
                        onclick="cerrarConfig('obj')">✕</button></h4>
                <div class="config-row"><label>Reps:</label><button class="btn-fs"
                        onclick="adjustReps('obj', -1)">−</button><span id="reps-display-obj">5</span><button
                        class="btn-fs" onclick="adjustReps('obj', 1)">+</button></div>
                <div class="config-row"><label>Silencio:</label><button class="btn-fs"
                        onclick="adjustSilence('obj', -0.1)">−</button><span id="silence-display-obj">1.3</span><button
                        class="btn-fs" onclick="adjustSilence('obj', 0.1)">+</button></div>
                <div class="config-row"><label>Velocidad:</label><button class="btn-fs"
                        onclick="adjustSpeed('obj', -1)">−</button><span id="speed-display-obj">0</span><button
                        class="btn-fs" onclick="adjustSpeed('obj', 1)">+</button></div>
                <div class="config-row"><label>Tamaño letra:</label><button class="btn-fs"
                        onclick="adjustFontSize('obj', -1)">−</button><span id="fs-display-obj">26</span><button
                        class="btn-fs" onclick="adjustFontSize('obj', 1)">+</button></div>
                <div class="config-row"><label>Grosor:</label>
                    <button class="btn-fs" id="peso-300-obj" onclick="setPeso('obj', 300)" title="Light">L</button>
                    <button class="btn-fs" id="peso-400-obj" onclick="setPeso('obj', 400)" title="Normal">N</button>
                    <button class="btn-fs" id="peso-700-obj" onclick="setPeso('obj', 700)" title="Bold"><b>B</b></button>
                </div>
                <div class="config-row"><label>Fuente:</label><select id="dp-font-obj"
                        onchange="dpFont('obj', this.value)" class="font-select" style="flex:1;"></select></div>
                <div class="config-row" id="row-translit" style="display:none;"><label>Transliteración:</label><button
                        class="config-toggle" id="toggle-trans" onclick="toggleTrans()">Show</button></div>
                <div class="config-row" id="row-nikud-global" style="display:none;"><label>Nikud (todas):</label><button
                        class="config-toggle" id="toggle-nikud-global" onclick="toggleNikudGlobal()">Show</button></div>
                <div class="config-row"><label>Texto:</label><button class="config-toggle activo" id="toggle-text-obj"
                        onclick="toggleTexto('obj')">Hide</button></div>
                <div class="config-row" id="row-glosas-obj" style="display:none;"><label>Traducción:</label><button
                        class="config-toggle" id="toggle-glosas-obj" onclick="toggleGlosas('obj')">Show</button></div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- ===== BLOQUE IDIOMA BASE ===== -->
        <div class="bloque">
            <div class="frase-box">
                <div>
                    <div class="texto-base" id="texto-base"></div>
                    <div class="translit" id="translit-base" style="display:none;"></div>
                </div>
            </div>
            <div class="progress-row">
                <span class="rep-counter" id="rep-counter-base">0/1</span>
                <button class="phrase-play-btn" onclick="playPhrase('base')" title="Play"><img
                        id="phrase-icon-base" src="icons/player-ply.svg" alt="Play" style="width:22px; height:22px; vertical-align:middle;"></button>

    <script src="js/engine-v2.js"></script>
    <script src="js/spaced-repetition.js"></script>
    <script>
        /* ============================================================
           LANGUAGE LAB — núcleo de la app
           Modelo: el alumno elige un PAR de idiomas (base + objetivo)
           y una expresión de GÉNERO. Solo se cargan esos dos idiomas.
           ============================================================ */

        // ----- Catálogo de idiomas (agrega aquí los futuros) -----
        const IDIOMAS_INFO = {
            he: { nombre: 'Hebreo', iso3: 'HEB', flag: '🇮🇱', tts: 'he-IL', rtl: true, tieneNikud: true, tieneTranslit: true },
            en: { nombre: 'Inglés', iso3: 'ENG', flag: '🇺🇸', tts: 'en-US' },
            es: { nombre: 'Español', iso3: 'SPA', flag: '🇪🇸', tts: 'es-ES' },
            pt: { nombre: 'Portugués', iso3: 'POR', flag: '🇧🇷', tts: 'pt-BR' },
            zh: { nombre: 'Chino', iso3: 'ZHO', flag: '🇨🇳', tts: 'zh-CN', tieneTranslit: true },
            de: { nombre: 'Alemán', iso3: 'DEU', flag: '🇩🇪', tts: 'de-DE' },
            fr: { nombre: 'Francés', iso3: 'FRA', flag: '🇫🇷', tts: 'fr-FR' },
            ru: { nombre: 'Ruso', iso3: 'RUS', flag: '🇷🇺', tts: 'ru-RU', tieneTranslit: true }
        };

        // 🔒 AUDIOS PROTEGIDOS: los MP3 monolíticos viven en Supabase Storage
        // (bucket privado "audios"). Solo usuarios con sesión obtienen URLs
        // firmadas y temporales. Si un audio no está, cae al fallback TTS.
        const BUCKET_AUDIOS = 'audios';
        const AUDIO_URL_TTL = 21600; // 6 horas
        const AUDIO_MONOLITICO_ARCHIVOS = {
            en: 'en_milo_rvcr_P1_v1.mp3',
            es: 'sp_Bautista-rvcr_p1_v1.mp3',
            he: 'he_Atlas_rvcr_p1_v1.mp3'
        };
        const AUDIO_MONOLITICO = {}; // lang -> URL firmada (se llena en iniciar)

        async function cargarAudiosProtegidos() {
            if (!window.supabase) return;
            for (const [lang, archivo] of Object.entries(AUDIO_MONOLITICO_ARCHIVOS)) {
                try {
                    const { data, error } = await window.supabase
                        .storage.from(BUCKET_AUDIOS)
                        .createSignedUrl(archivo, AUDIO_URL_TTL);
                    if (!error && data?.signedUrl) {
                        AUDIO_MONOLITICO[lang] = data.signedUrl;
                    } else {
                        console.warn(`⚠️ Sin audio protegido para ${lang}:`, error?.message);
                    }
                } catch (err) {
                    console.warn(`⚠️ Error firmando URL de ${lang}:`, err);
                }
            }
        }

        // Aviso visual no intrusivo
        function mostrarToast(mensaje, esError = false) {
            let toast = document.getElementById('hg-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'hg-toast';
                toast.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:10px;color:#fff;font-weight:600;z-index:9999;box-shadow:0 4px 15px rgba(0,0,0,0.3);max-width:90%;text-align:center;';
                document.body.appendChild(toast);
            }
            toast.style.background = esError ? '#D35400' : '#1A365D';
            toast.innerText = mensaje;
            toast.style.display = 'block';
            clearTimeout(toast._t);
            toast._t = setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        // ----- Claves de persistencia -----
        const STORAGE_KEY = 'hardyglot_progreso_v3';   // misma clave: conserva tu progreso actual
        const PREFS_KEY = 'hardyglot_prefs_v1';        // pareja de idiomas + género + config por idioma

        // Cuando agregues las columnas next_review/review_level en Supabase
        // (ver INSTRUCCIONES.md), cambia esto a true:
        const SYNC_REPASOS = false;

        // ----- Estado global -----
        let frasesTodas = [];      // todas las frases normalizadas
        let frasesActivas = [];    // las visibles (puede ser el filtro de repasos)
        let indice = 0;
        let isPlaying = false;
        let modoRepaso = false;

        let pareja = { base: 'es', objetivos: ['en'], activo: 0 };
        let genero = 'm';
        let nombreAlumno = '';
        let objetivosSel = [];         // selección temporal en el modal (conserva el orden de elección)
        let secuenciaEnCurso = false;  // guardia: evita dos secuencias simultáneas

        const config = {};   // config por código de idioma (se crea bajo demanda)
        let progreso = {};   // progreso por idioma: progreso[lang][id]
        let vista = { translitVisible: false, nikud: { obj: false, base: false }, glosas: { obj: false, base: false } };
        // Overrides TEMPORALES (solo la frase actual): null = usar el default global de config/vista
        let overrideTexto = { obj: null, base: null };
        let overrideNikud = { obj: null, base: null };

        function resetOverridesFrase() {
            overrideTexto = { obj: null, base: null };
            overrideNikud = { obj: null, base: null };
        }

        const audioCache = {}; // url -> objeto Audio (se reutiliza)

        // ============================================================
        // NORMALIZACIÓN DEL JSON
        // Convierte el formato actual (idioma_objetivo + idiomas_soporte)
        // en un mapa plano de idiomas iguales entre sí. Así el JSON de
        // tu Apps Script sigue funcionando sin cambios.
        // ============================================================
        function normalizarFrase(f) {
            const idiomas = {};
            const o = f.idioma_objetivo;
            idiomas[o.codigo] = {
                frase: o.frase_completa,
                audio_url: o.audio_frase_url || '',
                sync: o.sincronizacion_audio || null,
                variantes: o.variantes_genero || null
            };
            (f.idiomas_soporte || []).forEach(s => {
                idiomas[s.codigo] = {
                    frase: s.frase_traduccion,
                    nikud: s.frase_traduccion_nikud || '',
                    translit: s.transliteracion || '',
                    audio_url: s.audio_url || '',
                    sync: s.sincronizacion_audio || null,
                    variantes: s.variantes_genero || null
                };
            });
            return { id: f.id, categoria: f.categoria || [], idiomas };
        }

        // Devuelve los datos de un idioma APLICANDO la variante de género
        // si existe (los campos de la variante pisan a los neutros).
        function datosIdioma(f, lang) {
            const d = f.idiomas[lang];
            if (!d) return null;
            const v = d.variantes && d.variantes[genero];
            if (!v) return d;
            return {
                frase: v.frase_traduccion || v.frase_completa || d.frase,
                nikud: v.frase_traduccion_nikud || d.nikud,
                translit: v.transliteracion || d.translit,
                audio_url: v.audio_url || d.audio_url,
                sync: v.sincronizacion_audio || d.sync,
                variantes: d.variantes
            };
        }

        // ============================================================
        // RESOLUCIÓN DE AUDIO (en orden de preferencia):
        // 1. Audio individual de la frase (audio_url del JSON)
        // 2. Segmento del MP3 monolítico (sync + archivo actual)
        // 3. Voz sintética del navegador (para idiomas sin audio aún)
        // ============================================================
        function getAudioObj(url) {
            if (!audioCache[url]) {
                const a = new Audio(url);
                a.addEventListener('error', () => {
                    console.error('❌ No se pudo cargar el audio:', url);
                    mostrarToast('⚠️ Un audio no cargó. Revisa tu conexión o tu sesión.', true);
                });
                audioCache[url] = a;
            }
            return audioCache[url];
        }

        function fuenteAudio(d, lang) {
            if (d.audio_url) {
                return { tipo: 'archivo', audio: getAudioObj(d.audio_url) };
            }
            if (d.sync && AUDIO_MONOLITICO[lang]) {
                return { tipo: 'segmento', audio: getAudioObj(AUDIO_MONOLITICO[lang]), sync: d.sync };
            }
            return { tipo: 'tts', texto: d.frase, ttsLang: (IDIOMAS_INFO[lang] || {}).tts || 'en-US' };
        }

        // ============================================================
        // CONFIG Y PROGRESO POR IDIOMA
        // ============================================================
        function getConfigIdioma(lang) {
            if (!config[lang]) {
                const esRTL = !!(IDIOMAS_INFO[lang] || {}).rtl;
                config[lang] = {
                    reps: 5,
                    intervalo: 1.3,
                    velocidad: -1,
                    textoVisible: true,
                    fontSize: esRTL ? 36 : 18,
                    peso: 400
                };
                // Fuente por defecto: hebreo ya definido (David Libre); el resto, Montserrat
                config[lang].fuente = esRTL ? 'David Libre' : 'Montserrat';
            }
            return config[lang];
        }

        function getProgreso(lang) {
            if (!progreso[lang]) progreso[lang] = {};
            const f = frasesActivas[indice];
            if (!f) return { reps: 0, stars: 0, dominada: false, lastStarDate: null };
            const id = f.id;
            if (!progreso[lang][id]) {
                progreso[lang][id] = { reps: 0, stars: 0, dominada: false, lastStarDate: null };
            }
            return progreso[lang][id];
        }

        function objetivoActivo() {
            return pareja.objetivos[pareja.activo] || pareja.objetivos[0];
        }
        function langDe(rol) { return rol === 'obj' ? objetivoActivo() : pareja.base; }
        function rolDe(lang) {
            if (lang === objetivoActivo()) return 'obj';
            if (lang === pareja.base) return 'base';
            return null;
        }

        // ============================================================
        // PERSISTENCIA: localStorage + Supabase (batch)
        // ============================================================
        async function guardarProgreso() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(progreso));
            } catch (e) {
                console.warn('Error guardando en localStorage:', e);
            }
            if (navigator.onLine) sincronizarConSupabase();
        }

        // FIX: antes se hacía un upsert por frase (hasta 120 requests).
        // Ahora se arma UNA sola llamada con todas las filas.
        async function sincronizarConSupabase() {
            if (!window.supabase) return;
            try {
                const { data: { session } } = await window.supabase.auth.getSession();
                if (!session) return;
                const user_id = session.user.id;

                const filas = [];
                for (const lang in progreso) {
                    for (const id in progreso[lang]) {
                        const p = progreso[lang][id];
                        const fila = {
                            user_id,
                            phrase_id: parseInt(id),
                            lang,
                            reps: p.reps || 0,
                            stars: p.stars || 0,
                            dominada: p.dominada || false,
                            updated_at: new Date().toISOString()
                        };
                        if (SYNC_REPASOS) {
                            fila.review_level = p.nivel_repaso || 0;
                            fila.next_review = p.proximo_repaso || null;
                        }
                        filas.push(fila);
                    }
                }
                if (!filas.length) return;

                const { error } = await window.supabase
                    .from('progreso')
                    .upsert(filas, { onConflict: 'user_id,phrase_id,lang' });

                if (error) console.error('Error sincronizando:', error);
                else console.log(`✅ Progreso sincronizado (${filas.length} filas, 1 request)`);
            } catch (err) {
                console.error('Error en sincronizarConSupabase:', err);
            }
        }

        // #13: perfil (nombre + idiomas + género) en la nube — sobrevive cambio de dispositivo
        async function guardarPerfilNube() {
            if (!window.supabase) return;
            try {
                const { data: { session } } = await window.supabase.auth.getSession();
                if (!session) return; // sin sesión: solo queda local (ya guardado)
                const { error } = await window.supabase.from('perfiles_lab').upsert({
                    user_id: session.user.id,
                    nombre: nombreAlumno,
                    genero: genero,
                    idioma_base: pareja.base,
                    idiomas_objetivo: pareja.objetivos,
                    updated_at: new Date().toISOString()
                }, { onConflict: 'user_id' });
                if (error) console.warn('⚠️ No se pudo sincronizar el perfil:', error.message);
            } catch (err) {
                console.warn('⚠️ Error sincronizando perfil:', err);
            }
        }

        async function cargarPerfilNube() {
            if (!window.supabase) return false;
            try {
                const { data: { session } } = await window.supabase.auth.getSession();
                if (!session) return false;
                const { data, error } = await window.supabase
                    .from('perfiles_lab').select('*').eq('user_id', session.user.id).maybeSingle();
                if (error || !data) return false;

                nombreAlumno = data.nombre || nombreAlumno;
                genero = data.genero || genero;
                pareja.base = data.idioma_base || pareja.base;
                pareja.objetivos = (data.idiomas_objetivo && data.idiomas_objetivo.length)
                    ? data.idiomas_objetivo : pareja.objetivos;
                pareja.activo = 0;
                console.log('✅ Perfil cargado de Supabase (mismo perfil en cualquier dispositivo)');
                return true;
            } catch (err) {
                console.warn('⚠️ Error cargando perfil de la nube:', err);
                return false;
            }
        }

        async function cargarProgreso() {
            const deLocal = () => {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) try { progreso = JSON.parse(raw); } catch (e) { }
            };
            if (!window.supabase) return deLocal();
            try {
                const { data: { session } } = await window.supabase.auth.getSession();
                if (!session) return deLocal();

                const { data, error } = await window.supabase
                    .from('progreso').select('*').eq('user_id', session.user.id);
                if (error) throw error;

                if (data && data.length > 0) {
                    progreso = {};
                    data.forEach(row => {
                        if (!progreso[row.lang]) progreso[row.lang] = {};
                        progreso[row.lang][row.phrase_id.toString()] = {
                            reps: row.reps, stars: row.stars, dominada: row.dominada,
                            lastStarDate: null,
                            nivel_repaso: row.review_level ?? undefined,
                            proximo_repaso: row.next_review ?? undefined
                        };
                    });
                    // Los datos de repaso viven en localStorage mientras
                    // SYNC_REPASOS sea false: los mezclamos para no perderlos.
                    if (!SYNC_REPASOS) mezclarRepasosLocales();
                    console.log('✅ Progreso cargado de Supabase');
                } else {
                    deLocal();
                }
            } catch (err) {
                console.error('Error cargando progreso:', err);
                deLocal();
            }
        }

        function mezclarRepasosLocales() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const local = JSON.parse(raw);
                for (const lang in local) {
                    for (const id in local[lang]) {
                        const l = local[lang][id];
                        if (l.proximo_repaso && progreso[lang] && progreso[lang][id]) {
                            progreso[lang][id].proximo_repaso = l.proximo_repaso;
                            progreso[lang][id].nivel_repaso = l.nivel_repaso || 0;
                        }
                    }
                }
            } catch (e) { }
        }

        // ============================================================
        // PREFERENCIAS DEL USUARIO (idiomas + género)
        // ============================================================
        function cargarPreferencias() {
            try {
                const raw = localStorage.getItem(PREFS_KEY);
                if (raw) {
                    const p = JSON.parse(raw);
                    if (p.pareja) {
                        // Migración: formato viejo { base, objetivo } → { base, objetivos: [...] }
                        if (p.pareja.objetivo && !p.pareja.objetivos) {
                            pareja = { base: p.pareja.base, objetivos: [p.pareja.objetivo], activo: 0 };
                        } else {
                            pareja = p.pareja;
                            if (!Array.isArray(pareja.objetivos) || !pareja.objetivos.length) {
                                pareja.objetivos = ['en'];
                            }
                            pareja.activo = 0; // cada sesión arranca por el primer idioma
                        }
                    }
                    if (p.genero) genero = p.genero;
                    if (p.nombre) nombreAlumno = p.nombre;
                    if (p.config) Object.assign(config, p.config);
                    if (p.vista) Object.assign(vista, p.vista);
                    // Migración v2: nikud y transliteración ocultos por defecto
                    if (!p.vistaV2) {
                        vista.translitVisible = false;
                        vista.nikud = { obj: false, base: false };
                    }
                    // Migración v3: el materno visible por defecto
                    if (!p.vistaV3) {
                        vista.blurBase = false;
                        if (config.es) config.es.textoVisible = true;
                    }
                }
            } catch (e) { }
        }

        function persistirPreferencias() {
            localStorage.setItem(PREFS_KEY, JSON.stringify({ pareja, genero, nombre: nombreAlumno, config, vista, vistaV2: true, vistaV3: true }));
        }

        const APP_VERSION = 'v2.0.0-alfa';
        console.log('%cEri\'s LingoLab ' + APP_VERSION, 'color:#1A365D; font-weight:bold; font-size:14px;');

        const IDIOMAS_ACTIVOS = ['es', 'en', 'he']; // con contenido listo hoy

        // Idioma del navegador/región del estudiante, si está entre los activos

        // Selector compacto: chips elegidos (orden izq→der) + dropdown para agregar

        function seleccionarGenero(g) { genero = g; marcarGeneroUI(); }

        function renderBarraGlobal() {
            const fill = document.getElementById('barra-global-fill');
            if (!fill) return;
            const total = frasesTodas.length * pareja.objetivos.length;
            if (!total) { fill.style.width = '0%'; return; }
            let dominadas = 0;
            pareja.objetivos.forEach(lang => {
                const porLang = progreso[lang] || {};
                dominadas += Object.values(porLang).filter(p => p && p.dominada).length;
            });
            const pct = Math.round((dominadas / total) * 100);
            fill.style.width = pct + '%';
            document.getElementById('barra-global').title = `Progreso global del curso: ${pct}%`;
        }

        // Módulo activo hoy: 'shadowing'. Cuando se construya el motor de
        // práctica (#12 backlog), este mismo bloque cambia de MODO_ACTUAL
        // y de cálculo, sin tocar el resto de la UI.
        let MODO_ACTUAL = 'shadowing';

        function renderBarraModulo() {
            const fill = document.getElementById('barra-modulo-fill');
            const cont = document.getElementById('barra-modulo');
            if (!fill) return;
            const f = frasesActivas[indice];
            const lang = objetivoActivo();
            const c = getConfigIdioma(lang);

            } else if (MODO_ACTUAL === 'practica') {
                label = 'Práctica'; pct = 0; // motor aún no implementado
            }

        function renderChipsIdiomas() {

            if (!cont) return;

            const chipCss = 'border:1.5px solid #ddd; border-radius:20px; padding:2px 9px; font-size:12px; cursor:pointer; background:#fff; font-family:inherit; letter-spacing:0.5px;';

            // Solo los idiomas en ESTUDIO: banderita + código ISO de 3 letras.

        // Ajusta la UI estática al par elegido (títulos, botones hebreos, etc.)
        function aplicarPareja() {
            renderChipsIdiomas();
            syncVistaUI();
            poblarSelectFuentes(); // el idioma de cada bloque puede haber cambiado
            const infoObj = IDIOMAS_INFO[objetivoActivo()] || {};
            const infoBase = IDIOMAS_INFO[pareja.base] || {};

            document.getElementById('config-titulo-obj').innerText = infoObj.nombre || objetivoActivo();
            document.getElementById('config-titulo-base').innerText = infoBase.nombre || pareja.base;
            document.getElementById('nombre-base-toggle').innerText = tUI('texto');

            // Rasgos hebreos (nikud/translit/RTL) según dónde caiga el hebreo
            document.getElementById('btn-nikud-obj').style.display = infoObj.tieneNikud ? 'inline-block' : 'none';
            const rowNG = document.getElementById('row-nikud-global');
            if (rowNG) rowNG.style.display = (infoObj.tieneNikud || infoBase.tieneNikud) ? 'flex' : 'none';
            document.getElementById('btn-nikud-base').style.display = infoBase.tieneNikud ? 'inline-block' : 'none';
