        // ============================================================
        // RENDER PRINCIPAL
        // ============================================================
        function actualizarUI() {
            const f = frasesActivas[indice];
            if (!f) {
                document.getElementById('contador').innerText = 'Sin frases';
                document.getElementById('texto-obj').innerText = '—';
                document.getElementById('texto-base').innerText = '';
                return;
            }
            let etiqueta = (modoRepaso ? '📚 Repaso ' : 'Frase ') + `${indice + 1} de ${frasesActivas.length}`;
            if (pareja.objetivos.length > 1) {
                const nombre = (IDIOMAS_INFO[objetivoActivo()] || {}).nombre || objetivoActivo();
                etiqueta += ` · ${nombre}`;
            }
            document.getElementById('contador').innerText = etiqueta;

            renderBloque('obj');
            renderBloque('base');
            renderBarraGlobal();
            renderBarraModulo();
        }

        function renderBloque(rol) {
            const lang = langDe(rol);
            const f = frasesActivas[indice];
            const d = datosIdioma(f, lang);
            const info = IDIOMAS_INFO[lang] || {};
            const c = getConfigIdioma(lang);
            const textoEl = document.getElementById('texto-' + rol);
            const translitEl = document.getElementById('translit-' + rol);

            if (!d) {
                textoEl.innerText = '(sin datos para ' + lang + ')';
                translitEl.style.display = 'none';
                return;
            }

            // Texto (con nikud si aplica y está activo)
            let texto = d.frase;
            const nikudEfectivo = overrideNikud[rol] !== null ? overrideNikud[rol] : vista.nikud[rol];
            if (info.tieneNikud && nikudEfectivo && d.nikud) texto = d.nikud;

            // Cada palabra es clicable (TTS palabra a palabra) en ambos bloques.
            // Si la frase trae glosas (traducción por palabra) y el modo está activo,
            // se pintan debajo de cada palabra.
            // #16 v2: traducción AUTOMÁTICA POR PALABRA (temporal, mientras se
            // define el sistema definitivo en frases.json). Usa el endpoint
            // gratuito de Google Translate desde el navegador — sin backend,
            // sin API key. Corre SIEMPRE (no solo cuando el toggle está activo),
            // porque el hover debe mostrar la traducción de la palabra sin
            // necesidad de activar el modo "siempre visible".
            let glosasUsar = d.glosas;
            const esGlosaProvisional = !(Array.isArray(d.glosas) && d.glosas.length > 0);
            if (esGlosaProvisional && rol === 'obj') {
                const palabras = texto.split(' ');
                glosasUsar = palabras.map(p => {
                    const key = lang + ':' + pareja.base + ':' + p.toLowerCase();
                    return glosaWordCache[key] || null; // null = todavía no llega, se rellena solo
                });

                // Disparar traducciones pendientes en segundo plano (no bloquea el render)
                const fRef = f; // para no re-renderizar si el alumno ya cambió de frase
                palabras.forEach(p => {
                    const key = lang + ':' + pareja.base + ':' + p.toLowerCase();
                    if (glosaWordCache[key] === undefined) {
                        glosaWordCache[key] = null; // marca "en curso" para no pedirla dos veces
                        traducirPalabraAuto(p, lang, pareja.base).then(trad => {
                            glosaWordCache[key] = trad;
                            if (frasesActivas[indice] === fRef) renderBloque(rol);
                        });
                    }
                });
            }
            const tieneGlosas = Array.isArray(glosasUsar) && glosasUsar.length > 0;
            const rowGlosas = document.getElementById('row-glosas-' + rol);
            if (rowGlosas) rowGlosas.style.display = tieneGlosas ? 'flex' : 'none';
            const btnNik = document.getElementById('btn-nikud-' + rol);
            if (btnNik && info.tieneNikud) btnNik.classList.toggle('activo', nikudEfectivo);
            textoEl.innerHTML = envolverPalabras(texto, lang, glosasUsar, tieneGlosas && vista.glosas && vista.glosas[rol]);
            textoEl.style.fontSize = c.fontSize + 'px';
            textoEl.style.fontWeight = c.peso || 400;
            if (c.fuente) textoEl.style.fontFamily = `'${c.fuente}', sans-serif`;

            // Visibilidad del texto: override temporal de ESTA frase > default global
            const textoVisibleEfectivo = overrideTexto[rol] !== null ? overrideTexto[rol] : c.textoVisible;
            textoEl.classList.toggle('texto-oculto', !textoVisibleEfectivo);
            const btnPeek = document.getElementById('btn-blur-' + rol);
            if (btnPeek) btnPeek.classList.toggle('activo', textoVisibleEfectivo);

            // Transliteración (solo si el idioma la tiene)
            if (info.tieneTranslit && d.translit && vista.translitVisible) {
                translitEl.innerText = d.translit;
                translitEl.style.display = 'block';
            } else {
                translitEl.style.display = 'none';
            }

            renderProgreso(rol);
        }

        function renderProgreso(rol) {
            const lang = langDe(rol);
            const starsEl = document.getElementById('stars-' + rol);
            const repEl = document.getElementById('rep-counter-' + rol);
            const btn = document.getElementById('btn-dominada-' + rol);

            // 🎯 El bloque del idioma materno no muestra progreso (no se contabiliza)
            if (rol === 'base') {
                starsEl.style.display = 'none';
                repEl.style.display = 'none';
                btn.style.display = 'none';
                return;
            }
            starsEl.style.display = '';
            repEl.style.display = '';
            btn.style.display = '';

            const c = getConfigIdioma(lang);
            const p = getProgreso(lang);

            let html = '';
            for (let i = 1; i <= 5; i++) html += `<i class="${i <= p.stars ? 'fas' : 'far'} fa-star"></i>`;
            starsEl.innerHTML = html;
            repEl.innerText = `${Math.min(repsDeHoy(p), c.reps)}/${c.reps}`;

            btn.classList.toggle('hecha', !!p.dominada);
            btn.innerText = p.dominada ? '✓ Dominada' : '¡Ya!';
        }

        function envolverPalabras(texto, lang, glosas, mostrarGlosas) {
            return texto.split(' ').map((p, i) => {
                const g = (glosas && glosas[i]) ? String(glosas[i]).replace(/"/g, '&quot;') : '';
                const attr = g ? ` data-glosa="${g}"` : '';
                const sub = (g && mostrarGlosas) ? `<small class="glosa">${g}</small>` : '';
                const cls = sub ? 'palabra palabra-col' : 'palabra';
                return `<span class="${cls}"${attr} onclick="reproducirPalabra('${p.replace(/'/g, "\\'")}','${lang}')">${p}${sub}</span>`;
            }).join(' ');
        }

        function reproducirPalabra(palabra, lang) {
            const limpio = palabra.replace(/[.,!?¿¡":]/g, '');
            if (!('speechSynthesis' in window)) return;
            const u = new SpeechSynthesisUtterance(limpio);
            u.lang = (IDIOMAS_INFO[lang] || {}).tts || 'en-US';
            speechSynthesis.speak(u);
        }

        // ============================================================
        // ESTRELLAS Y REPETICIONES
        // Máximo una estrella nueva por día por frase (constancia real)
        // ============================================================
        function repsDeHoy(p) {
            return p.lastRepDate === SpacedRepetition.hoy() ? (p.reps || 0) : 0;
        }

        function incrementarEstrella(lang) {
            // 🎯 El idioma materno NO contabiliza: solo los idiomas en estudio
            if (lang === pareja.base) return;

            const c = getConfigIdioma(lang);
            const p = getProgreso(lang);
            const hoyStr = SpacedRepetition.hoy();
            if (p.lastRepDate !== hoyStr) { p.reps = 0; p.lastRepDate = hoyStr; }
            p.reps = Math.min(p.reps + 1, c.reps);
            if (p.reps === c.reps) {
                const hoy = SpacedRepetition.hoy();
                if (p.lastStarDate !== hoy && p.stars < 5) {
                    p.stars++;
                    p.lastStarDate = hoy;
                }
            }
            const rol = rolDe(lang);
            if (rol) renderProgreso(rol);
            guardarProgreso();
        }

        function marcarDominada(rol) {
            const lang = langDe(rol);
            const p = getProgreso(lang);
            if (!p.dominada) {
                SpacedRepetition.programarPrimerRepaso(p);
                console.log(`📅 Próximo repaso: ${p.proximo_repaso}`);
            }
            renderProgreso(rol);
            guardarProgreso();
            actualizarBannerRepasos();
        }

        // ============================================================
        // REPASOS (repetición espaciada)
        // ============================================================
        function actualizarBannerRepasos() {
            const ids = SpacedRepetition.repasosPendientes(progreso, objetivoActivo());
            const banner = document.getElementById('banner-repasos');
            if (ids.length > 0 && !modoRepaso) {
                document.getElementById('banner-texto').innerText =
                    `📚 Tienes ${ids.length} repaso${ids.length > 1 ? 's' : ''} hoy`;
                banner.style.display = 'flex';
            } else {
                banner.style.display = 'none';
            }
        }

        function filtrarRepasos() {
            const ids = SpacedRepetition.repasosPendientes(progreso, objetivoActivo());
            if (!ids.length) return;
            AudioEngine.reset();
            setPlayUI(false);
            frasesActivas = frasesTodas.filter(f => ids.includes(f.id));
            indice = 0;
            modoRepaso = true;
            document.getElementById('banner-repasos').style.display = 'none';
            actualizarUI();
        }

        function verTodas() {
            AudioEngine.reset();
            setPlayUI(false);
            frasesActivas = frasesTodas;
            indice = 0;
            modoRepaso = false;
            actualizarUI();
            actualizarBannerRepasos();
        }

        // Al completar la secuencia de una frase que estaba pendiente
        // de repaso, se registra el repaso y se agenda el siguiente.
        function registrarRepasoSiCorresponde() {
            const lang = objetivoActivo();
            const p = getProgreso(lang);
            if (p.dominada && p.proximo_repaso && p.proximo_repaso <= SpacedRepetition.hoy()) {
                SpacedRepetition.completarRepaso(p);
                console.log(`✅ Repaso completado. Siguiente: ${p.proximo_repaso}`);
                guardarProgreso();
                actualizarBannerRepasos();
            }
        }

        // ============================================================
        // REPRODUCCIÓN
        // ============================================================
        function velocidadARate(inc) {
            return Math.max(0.25, Math.min(1 + inc * 0.25, 2));
        }

        function sincronizarEngine() {
            [pareja.base, objetivoActivo()].forEach(lang => {
                const c = getConfigIdioma(lang);
                AudioEngine.sessionConfig.reps[lang] = c.reps;
                AudioEngine.sessionConfig.silenceGap[lang] = c.intervalo;
                AudioEngine.sessionConfig.rate[lang] = velocidadARate(c.velocidad);
            });
        }

        // Secuencia pedagógica: materno → objetivo (una pasada por frase)
        function construirPasos(f) {
            const orden = [pareja.base, objetivoActivo()];
            return orden.map(lang => {
                const d = datosIdioma(f, lang);
                return { lang, fuente: fuenteAudio(d, lang) };
            });
        }

        function setPlayUI(playing) {
            isPlaying = playing;
            document.getElementById('play-icon').src = playing ? 'icons/player-pse.svg' : 'icons/player-ply.svg';
        }

        async function toggleAudio(forzarInicio = false) {
            if (!forzarInicio) setPlayUI(!isPlaying);
            else setPlayUI(true);

            if (!isPlaying) {
                AudioEngine.pause();
                return;
            }

            // 🛡️ Guardia: si ya hay una secuencia corriendo, no arrancar otra
            // (evita audios encimados por play/pausa/play rápidos)
            if (secuenciaEnCurso) return;

            const f = frasesActivas[indice];
            if (!f) { setPlayUI(false); return; }

            if (audiosProntos) { await audiosProntos; audiosProntos = null; }

            // 🎯 EL CONTADOR MANDA: si esta frase ya completó sus reps de hoy,
            // se salta sin reproducir y sigue de largo
            const restantes = repsRestantesHoy(f);
            if (restantes === 0 && !modoRepaso) {
                trasFraseCompleta(150); // salto rápido
                return;
            }

            sincronizarEngine();
            // Reproducir SOLO las repeticiones que faltan hoy
            AudioEngine.sessionConfig.reps[objetivoActivo()] = restantes;

            secuenciaEnCurso = true;
            let completa = false;
            try {
                completa = await AudioEngine.playSequence(
                    construirPasos(f),
                    (lang) => incrementarEstrella(lang)
                );
            } finally {
                secuenciaEnCurso = false;
            }

            if (completa && isPlaying) {
                registrarRepasoSiCorresponde();
                trasFraseCompleta(500);
            }
        }

        // Reps que le faltan a la frase HOY en el idioma activo
        function repsRestantesHoy(f) {
            const lang = objetivoActivo();
            const c = getConfigIdioma(lang);
            const p = (progreso[lang] && progreso[lang][f.id]) || null;
            const hechas = (p && p.lastRepDate === SpacedRepetition.hoy()) ? (p.reps || 0) : 0;
            return Math.max(0, c.reps - hechas);
        }

        // Qué sigue cuando una frase queda completa (reproducida o saltada)
        function trasFraseCompleta(delayMs) {
            const eraUltimaFrase = indice === frasesActivas.length - 1;

            if (eraUltimaFrase) {
                // 🔗 ENCADENAMIENTO: ¿hay más idiomas en la lista de estudio?
                if (pareja.activo < pareja.objetivos.length - 1) {
                    pareja.activo++;
                    indice = 0;
                    AudioEngine.reset();
                    const nombre = (IDIOMAS_INFO[objetivoActivo()] || {}).nombre || objetivoActivo();
                    mostrarToast(`🔗 Bloque completado. Ahora: ${nombre}`);
                    aplicarPareja();
                    actualizarUI();
                    setPlayUI(true);
                    setTimeout(() => { if (isPlaying) toggleAudio(true); }, 1200);
                } else {
                    // 🏁 Sesión completa: todos los idiomas, todas las frases
                    pareja.activo = 0;
                    AudioEngine.reset();
                    setPlayUI(false);
                    aplicarPareja();
                    actualizarUI();
                    mostrarToast('🏁 ¡Sesión completa! Todas las repeticiones de hoy están hechas.');
                }
            } else {
                cambiarFrase(1, true);
                setTimeout(() => { if (isPlaying) toggleAudio(true); }, delayMs);
            }
        }

        // Play individual de un bloque (una sola reproducción)
        async function playPhrase(rol) {
            const lang = langDe(rol);
            const f = frasesActivas[indice];
            if (!f) return;

            AudioEngine.pause();
            setPlayUI(false);

            // Icono HardyGlot en modo "sonando" con ondas
            const icono = document.getElementById('phrase-icon-' + rol);
            if (icono) {
                icono.src = 'icons/hg-fav-playing.svg';
                icono.classList.add('hg-sonando');
            }

            const d = datosIdioma(f, lang);
            const c = getConfigIdioma(lang);
            const rate = velocidadARate(c.velocidad);
            const fuente = fuenteAudio(d, lang);

            // Cuenta como una repetición manual (sube el contador, sin estrella automática)
            const p = getProgreso(lang);
            const hoyStr = SpacedRepetition.hoy();
            if (p.lastRepDate !== hoyStr) { p.reps = 0; p.lastRepDate = hoyStr; }
            p.reps = Math.min(p.reps + 1, c.reps);
            renderProgreso(rol);
            guardarProgreso();

            await AudioEngine._playPaso({ lang, fuente }, rate);

            // La frase terminó: volver al botón de play normal
            if (icono) {
                icono.src = 'icons/player-ply.svg';
                icono.classList.remove('hg-sonando');
            }
        }

        function cambiarFrase(d, mantenerPlay = false) {
            if (!frasesActivas.length) return;
            if (!mantenerPlay) {
                AudioEngine.reset();
                setPlayUI(false);
            } else {
                AudioEngine.stepIndex = 0;
                AudioEngine.repIndex = 0;
            }
            indice = (indice + d + frasesActivas.length) % frasesActivas.length;
            resetOverridesFrase();
            actualizarUI();
        }

        // ============================================================
        // CONFIG POR BLOQUE (popups)
        // ============================================================
        function abrirConfig(rol) {
            document.querySelectorAll('.config-popup').forEach(p => p.style.display = 'none');
            document.getElementById('config-' + rol).style.display = 'block';
        }
        function cerrarConfig(rol) {
            document.getElementById('config-' + rol).style.display = 'none';
        }
        document.addEventListener('click', function (e) {
            document.querySelectorAll('.config-popup').forEach(popup => {
                if (popup.style.display === 'block' && !popup.contains(e.target) && !e.target.closest('.gear')) {
                    popup.style.display = 'none';
                }
            });
        });

        function adjustReps(rol, delta) {
            const c = getConfigIdioma(langDe(rol));
            c.reps = Math.max(1, Math.min(10, c.reps + delta));
            document.getElementById('reps-display-' + rol).innerText = c.reps;
            renderProgreso(rol);
            persistirPreferencias();
        }

        function adjustSilence(rol, delta) {
            const c = getConfigIdioma(langDe(rol));
            c.intervalo = Math.max(0, Math.min(3, parseFloat((c.intervalo + delta).toFixed(1))));
            document.getElementById('silence-display-' + rol).innerText = c.intervalo.toFixed(1);
            persistirPreferencias();
        }

        function adjustSpeed(rol, delta) {
            const c = getConfigIdioma(langDe(rol));
            c.velocidad = Math.max(-3, Math.min(4, c.velocidad + delta));
            document.getElementById('speed-display-' + rol).innerText = c.velocidad;
            persistirPreferencias();
        }

        function adjustFontSize(rol, delta) {
            const c = getConfigIdioma(langDe(rol));
            const maxFs = (IDIOMAS_INFO[langDe(rol)] || {}).rtl ? 42 : 34;
            c.fontSize = Math.max(12, Math.min(maxFs, c.fontSize + delta));
            document.getElementById('fs-display-' + rol).innerText = c.fontSize;
            document.getElementById('texto-' + rol).style.fontSize = c.fontSize + 'px';
            persistirPreferencias();
        }

        function toggleTexto(rol) {
            const c = getConfigIdioma(langDe(rol));
            c.textoVisible = !c.textoVisible;
            overrideTexto[rol] = null; // el cambio global manda de nuevo en esta frase
            const btn = document.getElementById('toggle-text-' + rol);
            btn.classList.toggle('activo', c.textoVisible);
            btn.innerText = c.textoVisible ? 'Hide' : 'Show';
            renderBloque(rol);
            persistirPreferencias();
        }

        function toggleNikud(rol) {
            const actual = overrideNikud[rol] !== null ? overrideNikud[rol] : vista.nikud[rol];
            overrideNikud[rol] = !actual;
            document.getElementById('btn-nikud-' + rol).classList.toggle('activo', overrideNikud[rol]);
            renderBloque(rol);
        }

        function syncVistaUI() {
            ['obj', 'base'].forEach(rol => {
                const btn = document.getElementById('btn-nikud-' + rol);
                if (btn) btn.classList.toggle('activo', !!vista.nikud[rol]);
            });
            const bt = document.getElementById('toggle-trans');
            if (bt) {
                bt.classList.toggle('activo', vista.translitVisible);
                bt.innerText = vista.translitVisible ? 'Hide' : 'Show';
            }
        }

        function toggleTrans() {
            vista.translitVisible = !vista.translitVisible;
            const btn = document.getElementById('toggle-trans');
            btn.classList.toggle('activo', vista.translitVisible);
            btn.innerText = vista.translitVisible ? 'Hide' : 'Show';
            renderBloque('obj');
            persistirPreferencias();
        }

        // #7: nikud GLOBAL desde la configuración (todas las ventanas y frases)
        function toggleGlosas(rol) {
            vista.glosas = vista.glosas || { obj: false, base: false };
            vista.glosas[rol] = !vista.glosas[rol];
            const btn = document.getElementById('toggle-glosas-' + rol);
            btn.classList.toggle('activo', vista.glosas[rol]);
            btn.innerText = vista.glosas[rol] ? 'Hide' : 'Show';
            renderBloque(rol);
            persistirPreferencias();
        }

        function setPeso(rol, peso) {
            const c = getConfigIdioma(langDe(rol));
            c.peso = peso;
            [300, 400, 700].forEach(p => {
                const b = document.getElementById(`peso-${p}-${rol}`);
                if (b) b.style.outline = p === peso ? '2px solid var(--color-1)' : 'none';
            });
            renderBloque(rol);
            persistirPreferencias();
        }

        function toggleNikudGlobal() {
            const nuevo = !(vista.nikud.obj || vista.nikud.base);
            vista.nikud.obj = nuevo;
            vista.nikud.base = nuevo;
            overrideNikud = { obj: null, base: null };
            syncVistaUI();
            document.getElementById('toggle-nikud-global').innerText = nuevo ? 'Hide' : 'Show';
            document.getElementById('toggle-nikud-global').classList.toggle('activo', nuevo);
            actualizarUI();
            persistirPreferencias();
        }

        // Botón pequeño: override TEMPORAL, solo para la frase visible ahora mismo.
        // No se guarda ni afecta a las demás frases (eso lo hace la config/gear).
        // #16 v2: caché en memoria para no pedir la misma palabra dos veces
        const glosaWordCache = {};

        // Traduce una palabra suelta con el endpoint gratuito de Google Translate.
        // Sin API key, sin backend — es un puente TEMPORAL mientras se define
        // el sistema definitivo de glosas en frases.json.
        async function traducirPalabraAuto(palabra, srcLang, tgtLang) {
            const limpio = palabra.replace(/[.,;:!?¿¡"'""]/g, '').trim();
            if (!limpio) return null;
            const intentar = async (codigoSrc) => {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${codigoSrc}&tl=${tgtLang}&dt=t&q=${encodeURIComponent(limpio)}`;
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                return data && data[0] && data[0][0] && data[0][0][0];
            };
            try {
                return (await intentar(srcLang)) || null;
            } catch (err) {
                // El hebreo a veces necesita el código clásico 'iw' en este endpoint
                if (srcLang === 'he') {
                    try { return (await intentar('iw')) || null; } catch (err2) { /* seguimos abajo */ }
                }
                console.warn('⚠️ Traducción automática no disponible para "' + palabra + '":', err.message);
                return null;
            }
        }

        function togglePeekTexto(rol) {
            const c = getConfigIdioma(langDe(rol));
            const actual = overrideTexto[rol] !== null ? overrideTexto[rol] : c.textoVisible;
            overrideTexto[rol] = !actual;
            document.getElementById('btn-blur-' + rol)?.classList.toggle('activo', overrideTexto[rol]);
            renderBloque(rol);
        }

        // ============================================================
        // DESIGN PANEL (claves con prefijo hgll- para no chocar
        // con las de Bet Midrash, que compartían nombres)
        // ============================================================
        const FUENTES_LATINAS = ['Bitter', 'Caveat', 'Fira Sans', 'Inter', 'Lora',
            'Merriweather', 'Montserrat', 'Nunito', 'Playfair Display', 'Poppins',
            'Quicksand', 'Roboto Slab', 'Space Grotesk'];
        // Lista curada por Ardy, en orden alfabético (#10, #11)
        const FUENTES_HEBREAS = ['Amatic SC', 'Bona Nova', 'Cardo', 'David Libre',
            'Frank Ruhl Libre', 'Fredoka', 'Gveret Levin', 'Karantina',
            'Noto Rashi Hebrew', 'Playpen Sans Hebrew', 'Rubik', 'Rubik Scribble',
            'Varela Round'];

        // Filtra la lista de fuentes según el idioma real de cada bloque (antes
        // se mostraban SIEMPRE ambos grupos, mezclando hebreas con latinas).
        function poblarSelectFuentes() {
            ['obj', 'base'].forEach(rol => {
                const sel = document.getElementById('dp-font-' + rol);
                if (!sel) return;
                const info = IDIOMAS_INFO[langDe(rol)] || {};
                const lista = info.rtl ? FUENTES_HEBREAS : FUENTES_LATINAS; // hoy: solo hebreo es no-latino
                const valorPrevio = sel.value;
                sel.innerHTML = '';
                lista.forEach(f => {
                    const o = document.createElement('option');
                    o.value = f; o.textContent = f;
                    sel.appendChild(o);
                });
                if (lista.includes(valorPrevio)) sel.value = valorPrevio;
            });
        }

        // #15: paletas conceptuales — cada una liderada por su valor
        const PALETAS = {
            // Slots: 1 primario · 2 acento · 3 oscuro/texto fuerte · 4 GRIS neutro (UI secundaria) · 5 fondo claro
            disciplina:  ['#1A365D', '#D35400', '#5C4033', '#707B7C', '#F4F6F6'],
            esfuerzo:    ['#5C4033', '#D69E2E', '#1A365D', '#8C7B6B', '#FAF5EF'],
            resiliencia: ['#4A5568', '#C05621', '#1A202C', '#A0AEC0', '#F7FAFC'],
            constancia:  ['#D35400', '#1A365D', '#7B341E', '#9C9691', '#FFF8F1'],
            claridad:    ['#2B6CB0', '#DD6B20', '#2D3748', '#9CA3AF', '#FFFFFF']
        };

        function aplicarPaleta(nombre) {
            const p = PALETAS[nombre];
            if (!p) return;
            p.forEach((color, i) => {
                const num = i + 1;
                document.getElementById('dp-color-' + num).value = color;
                dpVarColor(num, color);
            });
            // Consistencia total: el texto de cada idioma también sigue la paleta
            // (objetivo = color primario, materno = gris neutro), no solo la UI.
            const primario = p[0], grisNeutro = p[3];
            document.getElementById('dp-color-obj').value = primario;
            dpColor('obj', primario);
            document.getElementById('dp-color-base').value = grisNeutro;
            dpColor('base', grisNeutro);
            mostrarToast('🎨 Paleta aplicada: ' + nombre.charAt(0).toUpperCase() + nombre.slice(1));
        }

        function toggleDesignPanel() {
            document.getElementById('design-panel').classList.toggle('visible');
        }

        function dpColor(rol, color) {
            document.getElementById('texto-' + rol).style.color = color;
            localStorage.setItem('hgll-color-' + rol, color);
        }

        function dpFont(rol, font) {
            const c = getConfigIdioma(langDe(rol));
            c.fuente = font;
            document.getElementById('texto-' + rol).style.fontFamily = `'${font}', sans-serif`;
            persistirPreferencias();
        }

        function dpVarColor(num, color) {
            document.documentElement.style.setProperty(`--color-${num}`, color);
            localStorage.setItem(`hgll-var-color-${num}`, color);
        }

        function aplicarDiseño() {
            for (let i = 1; i <= 5; i++) {
                const c = localStorage.getItem(`hgll-var-color-${i}`);
                if (c) {
                    document.documentElement.style.setProperty(`--color-${i}`, c);
                    const input = document.getElementById(`dp-color-${i}`);
                    if (input) input.value = c;
                }
            }
            ['obj', 'base'].forEach(rol => {
                const color = localStorage.getItem('hgll-color-' + rol);
                if (color) {
                    document.getElementById('texto-' + rol).style.color = color;
                    document.getElementById('dp-color-' + rol).value = color;
                }
                // Migración única: si quedó una fuente guardada en el sistema
                // viejo (por posición en pantalla), pasarla al idioma actual y
                // olvidar la clave vieja — de aquí en adelante la fuente vive
                // en config[idioma].fuente, no en config[rol].
                const fontLegacy = localStorage.getItem('hgll-font-' + rol);
                if (fontLegacy) {
                    const c = getConfigIdioma(langDe(rol));
                    if (!c.fuente) c.fuente = fontLegacy;
                    localStorage.removeItem('hgll-font-' + rol);
                }
            });
        }

        function resetDesign() {
            Object.keys(localStorage)
                .filter(k => k.startsWith('hgll-'))
                .forEach(k => localStorage.removeItem(k));
            location.reload();
        }

        // ============================================================
        // SESIÓN Y ARRANQUE
        // ============================================================
        async function cerrarSesion() {
            const { error } = await window.supabase.auth.signOut();
            if (!error) window.location.href = '../../index.html';
            else alert('Error: ' + error.message);
        }

        let audiosProntos = null; // promesa de las URLs firmadas

        async function iniciar() {
            const esPrimeraVez = !localStorage.getItem(PREFS_KEY);
            cargarPreferencias();
            const huboPerfilEnNube = await cargarPerfilNube();
            const primeraVezReal = esPrimeraVez && !huboPerfilEnNube;

            // Primera visita: el materno por defecto es el idioma del navegador,
            // y el idioma de estudio por defecto, el primero activo que no sea el materno
            if (esPrimeraVez) {
                pareja.base = idiomaDelNavegador();
                // Por defecto: hebreo primero, inglés segundo (sin incluir el materno);
                // los demás idiomas los agrega el alumno a su gusto
                pareja.objetivos = ['he', 'en'].filter(c => c !== pareja.base);
                pareja.activo = 0;
            }
            poblarSelectFuentes();
            mostrarNombre();

            // 0) VALIDACIÓN DE PERFIL PRIMERO: sin perfil no se entra a la app
            if (primeraVezReal) abrirModalUsuario();

            // 1) TEXTOS: la app se ve de inmediato
            try {
                const resp = await fetch('frases.json');
                const crudas = await resp.json();
                frasesTodas = crudas.map(normalizarFrase);
            } catch (err) {
                console.error('❌ No se pudo cargar frases.json:', err);
                mostrarToast('⚠️ No se pudieron cargar las frases. Recarga la página.', true);
                frasesTodas = [];
            }
            frasesActivas = frasesTodas;

            // 2) Supabase en segundo plano (no bloquea la pantalla)
            audiosProntos = cargarAudiosProtegidos();
            cargarProgreso().then(() => { actualizarUI(); actualizarBannerRepasos(); });

            syncVistaUI();
            // El modal de onboarding (si aplica) ya está abierto; refrescar sus
            // opciones ahora que los datos cargaron
            if (primeraVezReal) { renderListaObjetivos(); }

            // Si el par guardado ya no existe en los datos, volver al default
            const disp = idiomasDisponibles();
            pareja.objetivos = pareja.objetivos.filter(c => disp.includes(c) && c !== pareja.base);
            if (!disp.includes(pareja.base)) pareja.base = 'es';
            if (!pareja.objetivos.length) pareja.objetivos = [disp.find(c => c !== pareja.base) || 'en'];
            pareja.activo = 0;

            aplicarPareja();
            actualizarUI();
            actualizarBannerRepasos();
        }

        iniciar();
    </script>
    <script>
        document.getElementById('app-footer').innerText =
            '© Copyright 2026 Hardyglot.com  ·  LingoLogic ' + APP_VERSION;
    </script>
