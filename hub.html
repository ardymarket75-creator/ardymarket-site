<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub - ArdyMarket</title>
    <link rel="icon" type="image/svg+xml" href="assets/am-fav.svg">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        // Guardia de sesión: sin login no hay Hub
        (async () => {
            const { data } = await window.supabase.auth.getSession();
            if (!data.session) window.location.href = 'index.html';
        })();
    </script>
    <style>
        body { font-family: 'Urbanist', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 60px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 800px; width: 90%; }
        h1 { font-size: 36px; margin-bottom: 5px; color: #1f2937; }
        h1 span { color: #10B981; display: block; font-size: 28px; margin-top: 5px; }
        .saludo { color: #6b7280; font-size: 14px; margin-bottom: 35px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .container { padding: 30px; } }

        .card { border: 2px solid #E5E7EB; border-radius: 15px; padding: 30px; text-decoration: none; color: #374151; transition: 0.3s; display: block; }
        .card:hover { border-color: #10B981; background: #f9fafb; transform: translateY(-5px); }
        .card i { font-size: 40px; color: #3B82F6; margin-bottom: 20px; }
        .card h2 { margin: 0 0 5px 0; font-size: 20px; color: #1f2937; }
        .card p { margin: 0; font-size: 14px; color: #6b7280; }

        .card-oculta { display: none; }

        .btn-salir {
            margin-top: 35px;
            background: none;
            border: 1px solid #E5E7EB;
            border-radius: 10px;
            padding: 10px 22px;
            font-family: 'Urbanist', sans-serif;
            font-weight: 600;
            color: #6b7280;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-salir:hover { border-color: #e74c3c; color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ArdyMarket <span>Hub</span></h1>
        <p class="saludo" id="saludo">Bienvenido</p>
        <div class="grid">
            <a href="hardyglot/index.html" class="card">
                <i class="fa-solid fa-brain"></i>
                <h2>Hardyglot</h2>
                <p>Otro idioma es posible</p>
            </a>
            <a href="scholar/index.html" class="card">
                <i class="fa-solid fa-graduation-cap"></i>
                <h2>Hardy Scholar</h2>
                <p>Educación integral</p>
            </a>
            <a href="bet-midrash.html" class="card" id="card-bet-midrash">
                <i class="fa-solid fa-book-tanakh"></i>
                <h2>Bet Midrash</h2>
                <p>Estudios y Liturgia</p>
            </a>
            <a href="store/index.html" class="card">
                <i class="fa-solid fa-store"></i>
                <h2>Hardy Store</h2>
                <p>Productos digitales</p>
            </a>
        </div>
        <button class="btn-salir" onclick="cerrarSesion()"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</button>
    </div>

    <script>
        // Personalizar saludo + mostrar Bet Midrash SOLO a usuarios validados
        (async () => {
            try {
                const { data: { session } } = await window.supabase.auth.getSession();
                if (!session) return;

                const saludoEl = document.getElementById('saludo');
                saludoEl.innerText = 'Bienvenido, ' + (session.user.email || '');

                // Acceso a Bet Midrash: validación manual vía profiles.bet_midrash_access
                const { data, error } = await window.supabase
                    .from('profiles')
                    .select('bet_midrash_access')
                    .eq('id', session.user.id)
                    .single();

                if (!error && data && data.bet_midrash_access === true) {
                    document.getElementById('card-bet-midrash').classList.remove('card-oculta');
                }
            } catch (err) {
                console.warn('No se pudo verificar acceso a Bet Midrash:', err);
            }
        })();

        async function cerrarSesion() {
            const { error } = await window.supabase.auth.signOut();
            if (!error) window.location.href = 'index.html';
            else alert("Error: " + error.message);
        }
    </script>
</body>
</html>
